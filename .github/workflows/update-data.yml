name: Update sector data

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild embedded data
        run: python build_embedded_data.py

      - name: Sync standalone entrypoint
        run: cp sector_dashboard_standalone.html index.html

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sector_data.js index.html
          git diff --cached --quiet && exit 0
          git commit -m "Update sector data"
          git push
