name: Update sector data

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'build_embedded_data.py'
      - '.github/workflows/update-data.yml'

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild embedded data
        run: |
          python build_embedded_data.py
          SIZE=$(wc -c < sector_data.js)
          echo "sector_data.js size: $SIZE bytes"
          if [ "$SIZE" -gt 5000000 ]; then
            echo "WARNING: file too large ($SIZE bytes), may cause push failure"
          fi

      - name: Sync standalone entrypoint
        run: cp sector_dashboard_standalone.html index.html

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sector_data.js index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          echo "Files changed:"
          git diff --cached --stat
          git commit -m "Update sector data"
          git push --force-with-lease
